<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danzz Verse Market</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
    background: linear-gradient(-45deg, #001aff, #0033ff, #0055ff, #0099ff);
    background-size: 400% 400%;
    animation: neonBG 10s ease infinite;
}

@keyframes neonBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

header {
    text-align: center;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
}

/* STATUS */
.status {
    text-align: center;
    margin-bottom: 15px;
    font-size: 16px;
    font-weight: bold;
}

.dot {
    height: 10px;
    width: 10px;
    background-color: lime;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    animation: blink 1s infinite;
    box-shadow: 0 0 10px lime;
}

.online-text {
    color: lime;
    text-shadow: 0 0 10px lime, 0 0 20px lime;
}

@keyframes blink {
    0% {opacity: 1;}
    50% {opacity: 0.3;}
    100% {opacity: 1;}
}

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
}

.card {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 15px;
    width: 250px;
    text-align: center;
    box-shadow: 0 0 20px #00ccff;
}

.price { margin: 10px 0; }

.old {
    text-decoration: line-through;
    color: #ff4444;
}

.best {
    background: gold;
    color: black;
    padding: 3px 8px;
    border-radius: 8px;
    font-size: 12px;
}

button {
    background: #00ccff;
    border: none;
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 5px;
}

button:hover { background: #0099cc; }

/* KERANJANG PERSEGI */
.cart {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: black;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 0 20px #00ccff;
    width: 220px; /* lebih kecil & persegi */
}

.cart ul {
    padding-left: 15px;
    font-size: 13px;
}

.total {
    margin-top: 10px;
    font-weight: bold;
    font-size: 14px;
}

.remove {
    background: red;
    font-size: 11px;
    padding: 2px 5px;
    margin-left: 5px;
}
</style>
</head>
<body>

<header>Danzz Verse Market 💙</header>

<div class="status">
    <span class="dot"></span>
    <span class="online-text">STATUS: ONLINE</span><br>
    👁️ DIKUNJUNGI: <span id="visitor">0</span>
</div>

<div class="container">

    <div class="card">
        <span class="best">🔥 PALING LARIS</span>
        <h3>APK SPAM</h3>
        <div class="price">Rp20.000</div>
        <button onclick="addToCart('APK SPAM',20000)">BELI</button>
    </div>

    <div class="card">
        <h3>APK UNBAN</h3>
        <div class="price">
            <span class="old">Rp35.000</span><br>
            Rp30.000
        </div>
        <button onclick="addToCart('APK UNBAN',30000)">BELI</button>
    </div>

</div>

<div class="cart">
    <h4>🛒 Keranjang</h4>
    <ul id="cartList"></ul>
    <div class="total">Total: Rp<span id="totalHarga">0</span></div>
    <button onclick="checkout()">BELI SEKARANG</button>
</div>

<script>
let cart = [];

function addToCart(nama, harga){
    cart.push({nama, harga});
    renderCart();
}

function removeItem(index){
    cart.splice(index, 1);
    renderCart();
}

function renderCart(){
    let list = document.getElementById("cartList");
    let total = 0;
    list.innerHTML = "";

    cart.forEach((item, index) => {
        total += item.harga;

        let li = document.createElement("li");
        li.innerHTML = item.nama +
        ' <button class="remove" onclick="removeItem('+index+')">X</button>';

        list.appendChild(li);
    });

    document.getElementById("totalHarga").textContent = total.toLocaleString();
}

function checkout(){
    if(cart.length === 0){
        alert("Keranjang masih kosong!");
        return;
    }

    let total = 0;
    let namaProduk = [];

    cart.forEach(item => {
        total += item.harga;
        namaProduk.push(item.nama);
    });

    let gabungNama = namaProduk.join(" + ");

    let message = "Bang, mau beli " + gabungNama +
                  ", dengan total harga: " +
                  total.toLocaleString() +
                  ", Mohon untuk segera diproses 🙏🏻";

    window.location.href =
    "https://wa.me/6285707277941?text=" + encodeURIComponent(message);
}

/* Visitor Counter */
if(localStorage.getItem("visits") === null){
    localStorage.setItem("visits", 1);
}else{
    let count = parseInt(localStorage.getItem("visits"));
    localStorage.setItem("visits", count + 1);
}
document.getElementById("visitor").textContent = localStorage.getItem("visits");
</script>

</body>
</html>
